            renderLayer1();

        function renderLayer1() {
            let mapIndex = 0;
            for (let col = 0; col < mapHeight; col += tileSize) {
                for (let row = 0; row < mapWidth; row += tileSize) {
                    let tileVal = mapData.layers[0].data[mapIndex];
                    if (tileVal !== 0) {
                        tileVal -= 1
                        let sourceY = Math.floor(tileVal / atlasCol) * tileSize;
                        let sourceX = (tileVal % atlasCol) * tileSize;
                        ctx1.drawImage(
                            tileAtlas,
                            sourceX,
                            sourceY,
                            tileSize,
                            tileSize,
                            row,
                            col,
                            tileSize,
                            tileSize
                        );
                    }
                    mapIndex++;
                }
