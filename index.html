<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" type="module"></script>
</head>
<body>
    <div class="world" data-world>
        <div class="score">
            <span class="highscore-label">HI</span> <span data-highscore>00000</span>
            <span data-score>00000</span>
        </div>
        <div class="start" data-start-screen>
            <h1 class="game-title" data-game-title>Dino Run!</h1>
            <p class="msg" data-msg>Claw (SPACE) and YUMP (SPACE) button to Dinosaur!</p>
        </div>
        <img src="imgs/ground.png" class="ground" data-ground>
        <img src="imgs/ground.png" class="ground" data-ground>
        <img src="imgs/dino-stationary.png" class="dino" data-dino>
    </div>
</body>
</html>
